<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLD · Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-area"><i class="fas fa-qrcode"></i><span>KLD-<span
                        style="color: var(--yellow-highlight)">A</span></span></div>
            <div class="nav-links" id="sidebarNav">
                <div class="nav-item" data-page="home" onclick="navigateTo('home')"><i class="fas fa-home"></i> Home
                </div>
                <div class="nav-item active" data-page="login"><i class="fas fa-right-to-bracket"></i> Login</div>
                <div class="nav-item" data-page="register" onclick="navigateTo('register')"><i
                        class="fas fa-user-plus"></i> Register</div>
            </div>
        </aside>

        <main class="main-content" id="mainContent">
            <div class="page active-page" id="login">
                <div class="auth-container">
                    <div class="auth-card">
                        <div class="header-login">
                            <h2 style="color: var(--deep-green);">Welcome back</h2>
                            <p style="margin-bottom: 2rem; color: var(--text-secondary);">Enter your details</p>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <input type="email" id="login-email" placeholder="Email"
                                style="padding: 14px 20px; border-radius: 60px; border: 1px solid var(--border);">
                            <input type="password" id="login-password" placeholder="Password"
                                style="padding: 14px 20px; border-radius: 60px; border: 1px solid var(--border);">
                            <button class="btn btn-primary" style="justify-content: center;" onclick="handleLogin()">
                                <i class="fas fa-arrow-right"></i> Login
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
