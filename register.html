<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLD · Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-area"><i class="fas fa-qrcode"></i><span>KLD-<span
                        style="color: var(--yellow-highlight)">A</span></span></div>
            <div class="nav-links" id="sidebarNav">
                <div class="nav-item" data-page="home" onclick="navigateTo('index')"><i class="fas fa-home"></i> Home
                </div>
                <div class="nav-item" data-page="login" onclick="navigateTo('login')"><i
                        class="fas fa-right-to-bracket"></i> Login</div>
                <div class="nav-item active" data-page="register" onclick="navigateTo('register')"><i
                        class="fas fa-user-plus"></i> Register</div>
            </div>
        </aside>

        <main class="main-content" id="mainContent">
            <div class="page active-page" id="register">
                <div class="auth-container">
                    <div class="auth-card">
                        <h2 style="color: var(--deep-green);">Register</h2>
                        <p style="margin-bottom: 2rem; color: var(--text-secondary);">New? Join now!</p>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <input type="text" id="reg-name" placeholder="Full name"
                                style="padding: 14px 20px; border-radius: 60px; border: 1px solid var(--border);">
                            <input type="email" id="reg-email" placeholder="Email"
                                style="padding: 14px 20px; border-radius: 60px; border: 1px solid var(--border);">
                            <input type="password" id="reg-password" placeholder="Password"
                                style="padding: 14px 20px; border-radius: 60px; border: 1px solid var(--border);">
                            <select id="reg-role"
                                style="padding: 14px 20px; border-radius: 60px; border: 1px solid var(--border); background: white;">
                                <option value="student">Student</option>
                                <option value="teacher">Teacher</option>
                            </select>
                            <button class="btn btn-primary" style="justify-content: center;"
                                onclick="handleRegister()">Register</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
