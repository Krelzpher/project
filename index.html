<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLD · attendance system - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-wrapper">
    <aside class="sidebar">
      <div class="logo-area">
        <i class="fas fa-qrcode"></i>
        <span>KLD</span>
      </div>
          <div class="nav-links" id="sidebarNav">
            <div class="nav-item" data-page="home"><i class="fas fa-home"></i> Home</div>
            <div class="nav-item" data-page="login"><i class="fas fa-sign-in-alt"></i> Login</div>
            <div class="nav-item" data-page="register"><i class="fas fa-user-plus"></i> Register</div>
            <div class="nav-item" data-page="about"><i class="fas fa-info-circle"></i> About</div>
            <div style="height:1px; background:var(--border); margin:12px 0;"></div>
          </div>
        
      <div style="margin-top: auto; font-size:0.85rem; color:var(--text-secondary);">
        <i class="fas fa-circle" style="color:var(--main-green); font-size: 0.5rem;"></i> v1.0 · glass
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="page active-page" id="home">
        <div class="page-header">
          <button id="menu-btn" class="menu-btn">☰</button>
          <div id="overlay" class="overlay"></div>
          <h1>Welcome to KLD <span style="color:var(--main-green);">Attend!</span></h1>
          <button class="btn btn-primary" onclick="navigateTo('login')"><i class="fas fa-right-to-bracket"></i>
            Login</button>
        </div>
        <div class="glass-card" style="padding:3rem; text-align: center;">
          <i class="fas fa-fingerprint" style="font-size: 4rem; color: var(--deep-green); opacity: 0.6;"></i>
             
          <!-- Subject to change -->
          <h2 style="margin: 1rem 0 0.5rem;">Modern, Efficient, Logical Online Attendance System</h2>
          <p style="color: var(--text-secondary); max-width: 500px; margin: 0 auto;">multi-user friendly · OTP
            check‑in · real‑time insights</p>
          <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2.5rem;">
            <div class="badge success" style="background: var(--main-green); color:white;">#0F5132</div>
            <div class="badge" style="background:var(--yellow-highlight); color:#1e1e1e;">#FFC107</div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>

</html>
