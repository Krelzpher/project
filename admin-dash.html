<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLD · attendance system - Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fas fa-qrcode"></i>
                <span>KLD</span>
            </div>
            <div class="nav-links" id="sidebarNav">
                <div class="nav-item" data-page="admin-dash"><i class="fas fa-user-shield"></i> Dashboard</div>
            </div>
            <div style="margin-top: auto; font-size:0.85rem; color:var(--text-secondary);">
                <i class="fas fa-circle" style="color:var(--main-green); font-size: 0.5rem;"></i> v1.0 · glass
            </div>
        </aside>

        <main class="main-content" id="mainContent">
            <div class="page active-page" id="admin-dash">
                <div class="page-header">
                    <h1><i class="fas fa-user-shield" style="color:var(--main-green);"></i> Admin dashboard</h1>
                    <button class="btn btn-outline-green" onclick="navigateTo('home')"><i
                            class="fas fa-sign-out-alt"></i> logout</button>
                </div>
                <div class="glass-card" style="padding:1.5rem; margin-bottom:2rem;">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                        <h3> User Management</h3>
                        <button class="btn btn-primary"><i class="fas fa-plus"></i> add user</button>
                    </div>
                    <table class="table-modern">
                        <tr>
                            <th>Name</th>
                            <th>role</th>
                            <th>status</th>
                            <th>actions</th>
                        </tr>
                        
                            <!-- Contents are subjects to change once backend and database are implemented -->
                        <tr>
                            <td></td>
                            <td></td>
                            <td><!-- <span class="badge success">active</span> --></td>
                            <td><!-- <i class="fas fa-edit" style="color:var(--main-green);"></i> <i class="fas fa-trash"
                                    style="color:var(--error);margin-left:10px;"></i> --></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td><!-- <span class="badge success">active</span> --></td>
                            <td><!-- <i class="fas fa-edit" style="color:var(--main-green);"></i> <i class="fas fa-trash" style="color:var(--error); margin-left:10px;"></i> --></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td><!-- <span class="badge warning">inactive</span> --></td>
                            <td><!-- <i class="fas fa-edit" style="color:var(--main-green);"></i> <i class="fas fa-trash" style="color:var(--error);margin-left:10px;"></i> --></td>
                        </tr>
                    </table>
                </div>
                <div class="card-solid" style="padding:1.5rem;">
                    <h4> Overall Attendance (all classes)</h4>
                    <table class="table-modern">
                        <tr>
                            <th>class</th>
                            <th>teacher</th>
                            <th>present %</th>
                            <th>recent</th>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td><!-- <span class="badge success">good</span> --></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td><!-- <span class="badge warning">late avg</span> --></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td><!-- <span class="badge success">excellent</span> --></td>
                        </tr>
                        <!-- End of subjects for change -->
                    </table>
                    <p class="footer-info">* all datas are subject to change once backend and database are implemented.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
