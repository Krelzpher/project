<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLD · attendance system - Teacher Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fas fa-qrcode"></i>
                <span>KLD</span>
            </div>
            <div class="nav-links" id="sidebarNav">
                <div class="nav-item" data-page="teacher-dash"><i class="fas fa-chalkboard-teacher"></i> Dashboard</div>
            </div>
            <div style="margin-top: auto; font-size:0.85rem; color:var(--text-secondary);">
                <i class="fas fa-circle" style="color:var(--main-green); font-size: 0.5rem;"></i> v2.0 · glass
            </div>
        </aside>

        <main class="main-content" id="mainContent">
            <div class="page active-page" id="teacher-dash">
                <div class="page-header">
                    <h1><i class="fas fa-chalkboard-teacher" style="color:var(--main-green);"></i> Teacher dashboard
                    </h1>
                    <button class="btn btn-outline-green" onclick="navigateTo('home')"><i
                            class="fas fa-sign-out-alt"></i> logout</button>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-users"></i> <strong>24</strong> students present</div>
                    <div class="stat-card"><i class="fas fa-hourglass-half" style="color:var(--warning);"></i>
                        <strong>3</strong> late</div>
                    <div class="stat-card"><i class="fas fa-user-slash" style="color:var(--error);"></i>
                        <strong>2</strong> absent</div>
                </div>
                <div class="glass-card" style="padding:1.8rem; margin-bottom:2rem;">
                    <div style="display: flex; gap: 2rem; flex-wrap: wrap; align-items: center;">
                        <span
                            style="background: var(--deep-green); color:white; padding:0.8rem 2rem; border-radius:60px;">🔑
                            current OTP: <strong>3821</strong> (active)</span>
                        <button class="btn btn-primary"><i class="fas fa-rotate"></i> generate new OTP</button>
                        <span class="badge" style="background: var(--yellow-highlight);">expires in 5 min</span>
                    </div>
                </div>
                <div class="card-solid" style="padding:1.5rem;">
                    <h4> Attendance Summary · BSCS-101</h4>
                    <table class="table-modern">
                        <tr>
                            <th>Student</th>
                            <th>Status today</th>
                            <th>history %</th>
                        </tr>
                        <tr>
                            <td>Student 1</td>
                            <td><span class="badge success">present</span></td>
                            <td>92%</td>
                        </tr>
                        <tr>
                            <td>Student 2</td>
                            <td><span class="badge warning">late</span></td>
                            <td>78%</td>
                        </tr>
                        <tr>
                            <td>Student 3</td>
                            <td><span class="badge error">absent</span></td>
                            <td>64%</td>
                        </tr>
                    </table>
                    <button style="margin-top:1.5rem;" class="btn btn-outline-green"><i class="fas fa-download"></i>
                        download full report</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
